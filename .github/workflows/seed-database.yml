name: Seed Database

on:
  workflow_dispatch:
    inputs:
      create_superuser:
        description: "Create superuser? (yes/no)"
        required: false
        default: "no"
      superuser_username:
        description: "Superuser username (if creating)"
        required: false
        default: "admin"
      superuser_email:
        description: "Superuser email (if creating)"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  seed:
    name: Seed EC2 Database from fixture
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-seed-db
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Temporarily allow SSH from this runner
        shell: bash
        run: |
          set -euo pipefail

          RUNNER_IP=$(curl -fsS https://api.ipify.org || true)
          if [ -z "${RUNNER_IP}" ]; then
            RUNNER_IP=$(curl -fsS https://checkip.amazonaws.com | tr -d '\n')
          fi
          echo "RUNNER_IP=${RUNNER_IP}" >> "$GITHUB_ENV"

          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=portfolio-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)
          echo "SG_ID=${SG_ID}" >> "$GITHUB_ENV"

          echo "Allowing SSH from ${RUNNER_IP}/32 to ${SG_ID}..."
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            2>/dev/null || echo "Ingress rule already exists (continuing)"

      - name: Seed database via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_REF_NAME: ${{ github.ref_name }}
          CREATE_SUPERUSER: ${{ github.event.inputs.create_superuser }}
          SUPERUSER_USERNAME: ${{ github.event.inputs.superuser_username }}
          SUPERUSER_EMAIL: ${{ github.event.inputs.superuser_email }}
          SUPERUSER_PASSWORD: ${{ secrets.DJANGO_SUPERUSER_PASSWORD }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          timeout:  120s
          envs:     DEPLOY_REF_NAME,CREATE_SUPERUSER,SUPERUSER_USERNAME,SUPERUSER_EMAIL,SUPERUSER_PASSWORD
          script: |
            set -euo pipefail
            cd /home/ubuntu/portfolio
            source backend/venv/bin/activate

            DEPLOY_REF_NAME=${DEPLOY_REF_NAME:-main}
            echo "→ Pulling latest code from ${DEPLOY_REF_NAME} (ensures fixture is up to date)..."
            git fetch origin "${DEPLOY_REF_NAME}"
            git reset --hard "origin/${DEPLOY_REF_NAME}"

            FIXTURE_PATH="backend/content/fixtures/initial_data.json"
            SANITIZED_FIXTURE_PATH="/tmp/portfolio_initial_data.seed.json"

            echo "→ Normalizing fixture for required timestamps..."
            python3 - <<'PY'
            import json
            from datetime import datetime, timezone
            from pathlib import Path

            fixture_path = Path('backend/content/fixtures/initial_data.json')
            output_path = Path('/tmp/portfolio_initial_data.seed.json')
            now = datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z')
            media_fields = {
              'avatar',
              'resume',
              'infra_diagram',
              'icon_upload',
              'diagram_image',
              'image',
              'architecture_diagram',
              'company_logo',
              'cover_image',
            }

            items = json.loads(fixture_path.read_text(encoding='utf-8'))
            for item in items:
                fields = item.setdefault('fields', {})
                fields.setdefault('updated_at', now)
              for field_name in tuple(fields.keys()):
                if field_name in media_fields and fields.get(field_name) == '':
                  fields.pop(field_name, None)

            output_path.write_text(json.dumps(items, indent=2), encoding='utf-8')
            PY

            echo "→ Loading fixture data..."
            python backend/manage.py loaddata \
              "${SANITIZED_FIXTURE_PATH}" \
              --ignorenonexistent
            echo "✓ Fixture loaded"

            if [ "${CREATE_SUPERUSER:-no}" = "yes" ]; then
              echo "→ Creating or updating superuser '${SUPERUSER_USERNAME}'..."
              SUPERUSER_USERNAME="${SUPERUSER_USERNAME}" \
              SUPERUSER_EMAIL="${SUPERUSER_EMAIL}" \
              SUPERUSER_PASSWORD="${SUPERUSER_PASSWORD}" \
              python backend/manage.py shell -c "import os; from django.contrib.auth import get_user_model; User = get_user_model(); username = os.environ['SUPERUSER_USERNAME']; email = os.environ.get('SUPERUSER_EMAIL', ''); password = os.environ['SUPERUSER_PASSWORD']; user, created = User.objects.get_or_create(username=username, defaults={'email': email, 'is_staff': True, 'is_superuser': True}); user.email = email; user.is_staff = True; user.is_superuser = True; user.is_active = True; user.set_password(password); user.save(); print('created' if created else 'updated')"
              echo "✓ Superuser credentials applied"
            fi

            echo "→ Reloading gunicorn to clear any cached state..."
            sudo systemctl reload portfolio-gunicorn
            echo "✓ Done"

      - name: Revoke temporary SSH rule
        if: always()
        shell: bash
        run: |
          if [ -z "${SG_ID:-}" ] || [ -z "${RUNNER_IP:-}" ]; then exit 0; fi
          aws ec2 revoke-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            2>/dev/null || echo "Rule already revoked"
