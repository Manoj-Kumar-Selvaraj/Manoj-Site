name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        type: choice
        required: true
        default: apply
        options:
          - apply
          - destroy

concurrency:
  group: terraform-apply
  cancel-in-progress: false  # never interrupt a running apply

permissions:
  contents: read

jobs:
  terraform-apply:
    name: Terraform Apply (TFC)
    runs-on: ubuntu-latest
    # GitHub Environment gate — configure in repo Settings -> Environments -> production
    # Add a "Required reviewer" approval rule there for an extra human gate.
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TF_API_TOKEN is the ONLY Terraform-related secret needed in GitHub.
      # All TF_VAR_* and AWS provider credentials (AWS_ACCESS_KEY_ID,
      # AWS_SECRET_ACCESS_KEY) are stored as workspace variables in TFC.
      - name: Setup Terraform with TFC auth
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      # TFC runs the plan remotely. Workspace variables supply all inputs.
      - name: Terraform Plan
        id: plan
        run: |
          ACTION="${{ github.event.inputs.action || 'apply' }}"
          if [ "$ACTION" = "destroy" ]; then
            terraform plan -destroy -no-color -input=false
          else
            terraform plan -no-color -input=false
          fi

      # apply/destroy — executed remotely in TFC
      # TFC workspace should have Apply Method = Auto apply.
      # The GitHub Environment approval is the human gate before this step runs.
      - name: Terraform Apply / Destroy
        run: |
          ACTION="${{ github.event.inputs.action || 'apply' }}"
          if [ "$ACTION" = "destroy" ]; then
            echo "Running terraform destroy..."
            terraform destroy -auto-approve -input=false
          else
            echo "Running terraform apply..."
            terraform apply -auto-approve -input=false
          fi

      - name: Terraform Output
        if: ${{ github.event.inputs.action != 'destroy' }}
        run: terraform output
