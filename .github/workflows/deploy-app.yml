name: Deploy Application

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "infra/**"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy regardless of change detection"
        required: false
        default: true
        type: boolean
      deploy_frontend:
        description: "Deploy frontend to S3 and invalidate CloudFront shell"
        required: false
        default: true
        type: boolean
      deploy_backend:
        description: "Deploy backend to EC2 and refresh static/admin cache"
        required: false
        default: true
        type: boolean
  repository_dispatch:
    types: [deploy]

concurrency:
  group: deploy-app
  cancel-in-progress: false  # never cancel a running deploy

# Required for OIDC token exchange (no stored AWS keys)
permissions:
  id-token: write   # request OIDC JWT from GitHub
  contents: read    # checkout

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Detect which parts of the codebase changed so downstream jobs can be
  # skipped entirely and invalidations stay targeted (cheaper + faster).
  # ──────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit to diff against

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
              - 'infra/nginx.conf'
              - 'infra/portfolio-gunicorn.service'

  # ──────────────────────────────────────────────────────────────────────────
  # Build & deploy React to S3 → invalidate CloudFront
  # Skipped automatically when only backend files changed.
  # ──────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    environment: production
    needs: [detect-changes]
    # Run on changed frontend files, repository dispatch, or manual dispatch.
    # `force_deploy` lets you run even when path detection reports no changes.
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.force_deploy == 'true' || github.event.inputs.deploy_frontend != 'false'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build React app
        run: cd frontend && npm run build
        env:
          VITE_API_URL: /api

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region:       ${{ secrets.AWS_REGION }}

      # Upload assets with long-lived cache (hashed filenames by Vite)
      - name: Sync assets to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_FRONTEND }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.map"

      # Upload index.html with no-cache so users always get fresh SPA shell
      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp frontend/dist/index.html \
            s3://${{ secrets.S3_BUCKET_FRONTEND }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      # index.html is the only uncached file in the SPA shell; Vite hashes
      # all /assets/* filenames so they get new URLs automatically and don't
      # need invalidation. Targeting just these two paths keeps costs low
      # (first 1000 paths/month are free; /* counts as 1 but forces full purge).
      - name: Invalidate CloudFront SPA shell
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/" "/index.html" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation ID: $INVALIDATION_ID"

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy Django backend to EC2 via SSH
  # ──────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → EC2
    runs-on: ubuntu-latest
    environment: production
    needs: [detect-changes]
    # Run on changed backend files, repository dispatch, or manual dispatch.
    # `force_deploy` lets you run even when path detection reports no changes.
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.force_deploy == 'true' || github.event.inputs.deploy_backend != 'false'))
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-backend-deploy
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Temporarily allow SSH from this runner
        shell: bash
        run: |
          set -euo pipefail

          RUNNER_IP=$(curl -fsS https://api.ipify.org || true)
          if [ -z "${RUNNER_IP}" ]; then
            RUNNER_IP=$(curl -fsS https://checkip.amazonaws.com | tr -d '\n')
          fi
          if [ -z "${RUNNER_IP}" ]; then
            echo "::error::Could not determine runner public IP"
            exit 1
          fi
          echo "RUNNER_IP=${RUNNER_IP}" >> "$GITHUB_ENV"

          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=portfolio-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)

          if [ -z "${SG_ID}" ] || [ "${SG_ID}" = "None" ]; then
            echo "::error::Could not find security group with tag Name=portfolio-sg"
            exit 1
          fi
          echo "SG_ID=${SG_ID}" >> "$GITHUB_ENV"

          echo "Allowing SSH from ${RUNNER_IP}/32 to ${SG_ID}..."
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            2>/dev/null || echo "Ingress rule already exists (continuing)"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_REF_NAME: ${{ github.ref_name }}
          CLOUDFRONT_DOMAIN: ${{ secrets.CLOUDFRONT_DOMAIN }}
          DB_ENGINE: ${{ secrets.DB_ENGINE }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS }}
          EMAIL_USE_SSL: ${{ secrets.EMAIL_USE_SSL }}
          DEFAULT_FROM_EMAIL: ${{ secrets.DEFAULT_FROM_EMAIL }}
          CONTACT_NOTIFICATION_EMAIL: ${{ secrets.CONTACT_NOTIFICATION_EMAIL }}
          CONTACT_SUBMIT_RATE: ${{ secrets.CONTACT_SUBMIT_RATE }}
          CONTACT_MIN_FORM_FILL_MS: ${{ secrets.CONTACT_MIN_FORM_FILL_MS }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          timeout:  180s
          envs:     DEPLOY_REF_NAME,CLOUDFRONT_DOMAIN,DB_ENGINE,DB_NAME,DB_USER,DB_PASSWORD,DB_HOST,DB_PORT,DB_SSLMODE,EMAIL_HOST,EMAIL_PORT,EMAIL_HOST_USER,EMAIL_HOST_PASSWORD,EMAIL_USE_TLS,EMAIL_USE_SSL,DEFAULT_FROM_EMAIL,CONTACT_NOTIFICATION_EMAIL,CONTACT_SUBMIT_RATE,CONTACT_MIN_FORM_FILL_MS
          script: |
            set -euo pipefail
            cd /home/ubuntu/portfolio

            DEPLOY_REF_NAME=${DEPLOY_REF_NAME:-main}
            echo "→ Pulling latest code from ${DEPLOY_REF_NAME}..."
            git fetch origin "${DEPLOY_REF_NAME}"
            git reset --hard "origin/${DEPLOY_REF_NAME}"

            echo "→ Setting up Python virtual environment..."
            if [ ! -d "backend/venv" ]; then
              echo "  Creating venv (first deploy)..."
              python3 -m venv backend/venv
            fi
            source backend/venv/bin/activate

            echo "→ Installing Python dependencies..."
            pip install -r backend/requirements.txt -q

            echo "→ Running database migrations..."
            cd backend
            python manage.py migrate --noinput || {
              echo "ERROR: Database migration failed"
              exit 1
            }

            echo "→ Collecting static files..."
            python manage.py collectstatic --noinput -v 1 || {
              echo "ERROR: collectstatic failed"
              exit 1
            }
            echo "  Static files collected ✓"
            ls -lh staticfiles/ | head -20

            echo "→ Verifying required admin static assets..."
            for F in \
              "staticfiles/vendor/fontawesome-free/css/all.min.css" \
              "staticfiles/vendor/adminlte/css/adminlte.min.css" \
              "staticfiles/jazzmin/css/main.css" \
              "staticfiles/admin/js/vendor/jquery/jquery.js" \
              "staticfiles/vendor/bootstrap/js/bootstrap.bundle.min.js"; do
              if [ ! -f "$F" ]; then
                echo "ERROR: Missing required static file: $F"
                exit 1
              fi
            done
            echo "  Required admin static assets present ✓"

            echo "→ Publishing static files to /var/www/portfolio/staticfiles..."
            sudo mkdir -p /var/www/portfolio/staticfiles
            if command -v rsync >/dev/null 2>&1; then
              sudo rsync -a --delete staticfiles/ /var/www/portfolio/staticfiles/
            else
              sudo rm -rf /var/www/portfolio/staticfiles/*
              sudo cp -a staticfiles/. /var/www/portfolio/staticfiles/
            fi
            sudo chown -R www-data:www-data /var/www/portfolio/staticfiles
            sudo find /var/www/portfolio/staticfiles -type d -exec chmod 755 {} +
            sudo find /var/www/portfolio/staticfiles -type f -exec chmod 644 {} +

            for F in \
              "/var/www/portfolio/staticfiles/vendor/fontawesome-free/css/all.min.css" \
              "/var/www/portfolio/staticfiles/vendor/adminlte/css/adminlte.min.css" \
              "/var/www/portfolio/staticfiles/jazzmin/css/main.css" \
              "/var/www/portfolio/staticfiles/admin/js/vendor/jquery/jquery.js" \
              "/var/www/portfolio/staticfiles/vendor/bootstrap/js/bootstrap.bundle.min.js"; do
              if [ ! -f "$F" ]; then
                echo "ERROR: Missing published static file: $F"
                exit 1
              fi
            done
            echo "  Published static files verified ✓"
            cd ..

            echo "→ Refreshing systemd service definition..."
            sudo cp /home/ubuntu/portfolio/infra/portfolio-gunicorn.service \
              /etc/systemd/system/portfolio-gunicorn.service
            sudo systemctl daemon-reload
            sudo systemctl enable portfolio-gunicorn
            echo "  Service definition refreshed ✓"

            echo "→ Updating nginx config and reloading..."
            sudo cp /home/ubuntu/portfolio/infra/nginx.conf /etc/nginx/sites-available/portfolio
            sudo ln -sf /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/portfolio
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl restart nginx
            echo "  nginx restarted with portfolio site as active config ✓"

            echo "→ Pre-flight checks..."
            if [ ! -f /home/ubuntu/portfolio/backend/.env ]; then
              echo "ERROR: /home/ubuntu/portfolio/backend/.env is missing!"
              echo "This file must be created manually on the EC2 instance."
              exit 1
            fi
            echo "  .env file present ✓"

            echo "→ Patching .env with runtime hosts..."
            IMDSV2_TOKEN=$(curl -sf -X PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" || echo "")
            METADATA_HEADERS=()
            if [ -n "$IMDSV2_TOKEN" ]; then
              METADATA_HEADERS=(-H "X-aws-ec2-metadata-token: ${IMDSV2_TOKEN}")
            fi

            EC2_PUBLIC_DNS=$(curl -sf "${METADATA_HEADERS[@]}" http://169.254.169.254/latest/meta-data/public-hostname || echo "")
            EC2_PUBLIC_IP=$(curl -sf "${METADATA_HEADERS[@]}" http://169.254.169.254/latest/meta-data/public-ipv4 || echo "")
            SANITIZED_CLOUDFRONT_DOMAIN=$(printf '%s' "$CLOUDFRONT_DOMAIN" | sed -E 's#^https?://##; s#/.*$##')
            CLOUDFRONT_APEX_DOMAIN=${SANITIZED_CLOUDFRONT_DOMAIN#www.}
            CLOUDFRONT_WWW_DOMAIN=""
            if [[ -n "$CLOUDFRONT_APEX_DOMAIN" && "$CLOUDFRONT_APEX_DOMAIN" != *.cloudfront.net ]]; then
              CLOUDFRONT_WWW_DOMAIN="www.${CLOUDFRONT_APEX_DOMAIN}"
            fi
            CURRENT_HOSTS=$(grep -E '^ALLOWED_HOSTS=' backend/.env | cut -d= -f2- || echo "localhost,127.0.0.1")
            NEW_HOSTS="${CURRENT_HOSTS}"
            for H in "$EC2_PUBLIC_DNS" "$EC2_PUBLIC_IP" "$CLOUDFRONT_APEX_DOMAIN" "$CLOUDFRONT_WWW_DOMAIN"; do
              [ -n "$H" ] && [[ ",$NEW_HOSTS," != *",$H,"* ]] && NEW_HOSTS="${NEW_HOSTS},${H}"
            done
            sed -i "s|^ALLOWED_HOSTS=.*|ALLOWED_HOSTS=${NEW_HOSTS}|" backend/.env
            # Ensure CLOUDFRONT_DOMAIN is set in .env for Django to read
            if grep -q '^CLOUDFRONT_DOMAIN=' backend/.env; then
              sed -i "s|^CLOUDFRONT_DOMAIN=.*|CLOUDFRONT_DOMAIN=${CLOUDFRONT_APEX_DOMAIN}|" backend/.env
            else
              echo "CLOUDFRONT_DOMAIN=${CLOUDFRONT_APEX_DOMAIN}" >> backend/.env
            fi
            # Route media URLs through the primary CloudFront/domain distribution.
            if grep -q '^USE_PRIMARY_CDN_FOR_MEDIA=' backend/.env; then
              sed -i "s|^USE_PRIMARY_CDN_FOR_MEDIA=.*|USE_PRIMARY_CDN_FOR_MEDIA=True|" backend/.env
            else
              echo "USE_PRIMARY_CDN_FOR_MEDIA=True" >> backend/.env
            fi

            echo "→ Patching .env with email/contact settings..."
            python3 - <<'PY'
            import os
            import re
            from pathlib import Path

            env_path = Path('backend/.env')
            text = env_path.read_text(encoding='utf-8') if env_path.exists() else ''

            def normalize_db_sslmode(value: str) -> str:
                allowed = {'disable', 'allow', 'prefer', 'require', 'verify-ca', 'verify-full'}
                normalized = str(value or 'prefer').strip().strip('"\'').lower()
                return normalized if normalized in allowed else 'prefer'

            def format_env_value(value: str) -> str:
                raw = str(value)
                escaped = raw.replace('\\', '\\\\').replace('"', '\\"')
                return f'"{escaped}"'

            def upsert_env(content: str, key: str, value: str) -> str:
                if value is None:
                    return content
                value = str(value).strip()
                if not value:
                    return content

                line = f"{key}={format_env_value(value)}"
                pattern = rf"^{re.escape(key)}=.*$"
                if re.search(pattern, content, flags=re.M):
                    return re.sub(pattern, line, content, flags=re.M)
                if content and not content.endswith('\n'):
                    content += '\n'
                return content + line + '\n'

            updates = {
                'DB_ENGINE': os.getenv('DB_ENGINE', 'postgres') or 'postgres',
                'DB_NAME': os.getenv('DB_NAME', ''),
                'DB_USER': os.getenv('DB_USER', ''),
                'DB_PASSWORD': os.getenv('DB_PASSWORD', ''),
                'DB_HOST': os.getenv('DB_HOST', ''),
                'DB_PORT': os.getenv('DB_PORT', '5432') or '5432',
                'DB_SSLMODE': normalize_db_sslmode(os.getenv('DB_SSLMODE', 'prefer')),
                'EMAIL_HOST': os.getenv('EMAIL_HOST', ''),
                'EMAIL_PORT': os.getenv('EMAIL_PORT', ''),
                'EMAIL_HOST_USER': os.getenv('EMAIL_HOST_USER', ''),
                'EMAIL_HOST_PASSWORD': os.getenv('EMAIL_HOST_PASSWORD', ''),
                'EMAIL_USE_TLS': os.getenv('EMAIL_USE_TLS', ''),
                'EMAIL_USE_SSL': os.getenv('EMAIL_USE_SSL', ''),
                'DEFAULT_FROM_EMAIL': os.getenv('DEFAULT_FROM_EMAIL', ''),
                'CONTACT_NOTIFICATION_EMAIL': os.getenv('CONTACT_NOTIFICATION_EMAIL', ''),
                'CONTACT_SUBMIT_RATE': os.getenv('CONTACT_SUBMIT_RATE', '3/hour') or '3/hour',
                'CONTACT_MIN_FORM_FILL_MS': os.getenv('CONTACT_MIN_FORM_FILL_MS', '2500') or '2500',
            }

            for key, value in updates.items():
                text = upsert_env(text, key, value)

            env_path.write_text(text, encoding='utf-8')
            PY
            echo "  ALLOWED_HOSTS → ${NEW_HOSTS}"

            echo "→ Verifying venv/gunicorn binary..."
            ls -la /home/ubuntu/portfolio/backend/venv/bin/gunicorn || {
              echo "ERROR: gunicorn not found in venv"
              exit 1
            }

            echo "→ Ensuring gunicorn log files exist and are writable..."
            sudo touch /var/log/gunicorn-access.log /var/log/gunicorn-error.log
            sudo chown ubuntu:ubuntu /var/log/gunicorn-access.log /var/log/gunicorn-error.log

            echo "→ Restarting Gunicorn service..."
            if ! sudo systemctl restart portfolio-gunicorn; then
              echo "=== Gunicorn failed — systemctl status ==="
              sudo systemctl status portfolio-gunicorn --no-pager -l || true
              echo "=== Last 50 journal lines ==="
              sudo journalctl -u portfolio-gunicorn -n 50 --no-pager || true
              exit 1
            fi

            echo "→ Verifying service health..."
            sleep 3
            sudo systemctl is-active portfolio-gunicorn || {
              sudo journalctl -u portfolio-gunicorn -n 30 --no-pager
              exit 1
            }
            API_STATUS=$(curl -sS -o /tmp/portfolio-api-health.txt -w "%{http_code}" http://127.0.0.1/api/profile/me/ || echo "000")
            if [ "$API_STATUS" != "200" ] && [ "$API_STATUS" != "404" ]; then
              echo "ERROR: Local API probe failed with HTTP $API_STATUS"
              cat /tmp/portfolio-api-health.txt || true
              sudo systemctl status nginx --no-pager -l || true
              sudo systemctl status portfolio-gunicorn --no-pager -l || true
              exit 1
            fi
            echo "  Local API probe returned HTTP $API_STATUS ✓"
            echo "✓ Deployment complete"

      - name: Invalidate CloudFront static/admin cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/static/*" "/admin/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation ID: $INVALIDATION_ID"

      - name: Revoke temporary SSH rule
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SG_ID:-}" ] || [ -z "${RUNNER_IP:-}" ]; then
            echo "No SG_ID/RUNNER_IP found; skipping revoke"
            exit 0
          fi
          echo "Revoking SSH from ${RUNNER_IP}/32 on ${SG_ID}..."
          aws ec2 revoke-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            2>/dev/null || echo "Rule already revoked (continuing)"

  # ──────────────────────────────────────────────────────────────────────────
  # Post-deploy health check
  # ──────────────────────────────────────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-frontend, deploy-backend]
    # Run if at least one deploy job succeeded; 'always()' ensures we still
    # evaluate even when a job was skipped (skipped ≠ failed).
    if: always() && (needs.deploy-frontend.result == 'success' || needs.deploy-backend.result == 'success')
    steps:
      - name: Wait for services to stabilize
        run: sleep 20

      - name: Check API health
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
              "https://${{ secrets.CLOUDFRONT_DOMAIN }}/api/profile/me/" 2>/dev/null || echo "000")
            # 200 = profile exists, 404 = Django up but no profile yet — both mean API is healthy.
            # 400 must fail because it usually indicates DisallowedHost / bad proxy host handling.
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
              echo "✓ API healthy (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $STATUS) — retrying in 10s..."
            sleep 10
          done
          echo "✗ API health check failed after 3 attempts"
          exit 1

      - name: Check CloudFront distribution
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.CLOUDFRONT_DOMAIN }}" 2>/dev/null || echo "000")
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✓ Frontend healthy (HTTP $STATUS)"
          else
            echo "⚠ CloudFront returned HTTP $STATUS (may still be propagating)"
          fi
