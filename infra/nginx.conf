upstream gunicorn {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name _;    # Will be updated with your domain after certbot

    client_max_body_size 50M;
    keepalive_timeout 65;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Django static files (collected by collectstatic)
    location /static/ {
        alias /var/www/portfolio/staticfiles/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Django API
    location /api/ {
        proxy_pass         http://gunicorn;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect     off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Django admin
    location /admin/ {
        proxy_pass         http://gunicorn;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect     off;
    }

    # Health check endpoint (used by GitHub Actions health check)
    location /health/ {
        proxy_pass http://gunicorn;
        access_log off;
    }

    # Block access to .env and hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Catch-all: proxy everything else to Django (for / and other routes)
    location / {
        proxy_pass         http://gunicorn;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect     off;
    }
}

# After running certbot, it will add the HTTPS server block automatically:
# sudo certbot --nginx -d your-domain.com
