name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Avoid an ever-growing queue when pushing multiple times to the same PR.
concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── 1. SECRET SCAN ────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — scan every commit in PR
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # Uncomment + add the secret for private repos

  # ── 2. TERRAFORM CHECKS (TFC) ─────────────────────────────────────────────
  # All variables (TF_VAR_* + AWS_* for the AWS provider) live in the TFC
  # workspace under Settings -> Variables. The ONLY secret needed in GitHub
  # is TF_API_TOKEN (User or Team token from app.terraform.io).
  terraform-checks:
    name: Terraform Checks
    runs-on: ubuntu-latest
    env:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Configure Terraform Cloud token (optional)
        if: ${{ env.TF_API_TOKEN != '' }}
        run: |
          mkdir -p ~/.terraform.d
          cat > ~/.terraform.d/credentials.tfrc.json <<'JSON'
          {
            "credentials": {
              "app.terraform.io": {
                "token": "${{ env.TF_API_TOKEN }}"
              }
            }
          }
          JSON

      # ── fmt — no network needed ────────────────────────────────────────────
      - name: "terraform fmt -check"
        id: fmt
        run: terraform fmt -check -recursive -diff
        continue-on-error: true

      # ── tflint ────────────────────────────────────────────────────────────
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: Init TFLint plugins
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "tflint"
        id: tflint
        run: tflint --format=compact
        continue-on-error: true

      # ── init (no backend) — downloads providers for fmt/validate/tflint ──
      # Deliberately skips TFC backend so validate works even if TFC is
      # unreachable or the workspace hasn't been created yet.
      - name: "terraform init (providers only)"
        id: init
        run: terraform init -backend=false -input=false
        continue-on-error: true

      - name: "terraform validate"
        id: validate
        run: terraform validate -no-color
        continue-on-error: true

      # ── Speculative plan — requires live TFC connection ────────────────────
      # Re-init with the full TFC backend to run the speculative plan.
      # Zero TF_VAR_* or AWS credentials needed in GitHub Actions.
      - name: "terraform init (TFC backend for plan)"
        if: ${{ env.TF_API_TOKEN != '' }}
        run: terraform init -input=false
        continue-on-error: true
      - name: "terraform plan (TFC speculative run)"
        id: plan
        if: ${{ env.TF_API_TOKEN != '' }}
        run: terraform plan -no-color -input=false 2>&1 | tee plan.txt
        continue-on-error: true

      # ── PR comment — upsert so only one bot comment per PR ─────────────────
      - name: Post Terraform summary as PR comment
        uses: actions/github-script@v7
        if: ${{ always() && github.event_name == 'pull_request' }}
        with:
          script: |
            const fs = require("fs")
            const planFile = "infra/terraform/plan.txt"
            const plan = fs.existsSync(planFile)
              ? fs.readFileSync(planFile, "utf8").substring(0, 50000)
              : "_Speculative plan skipped — check init step or TF\\_API\\_TOKEN secret_"

            const icon = (s) => ({ success: "✅", failure: "❌", skipped: "⏭️" }[s] ?? "⚠️")
            const steps = ${{ toJSON(steps) }}

            const outcome = (id) => (steps[id] && steps[id].outcome) ? steps[id].outcome : "skipped"

            const rows = [
              ["terraform fmt -check", outcome("fmt")],
              ["tflint",               outcome("tflint")],
              ["terraform init",       outcome("init")],
              ["terraform validate",   outcome("validate")],
              ["terraform plan (TFC speculative)", outcome("plan")],
            ].map(([n, s]) => `| \`${n}\` | ${icon(s)} \`${s}\` |`).join("\n")

            const body = [
              "## Terraform PR Summary",
              "",
              "| Check | Status |",
              "|-------|--------|",
              rows,
              "",
              "> All variables resolved from **Terraform Cloud workspace** — no Terraform secrets in GitHub.",
              "",
              "<details><summary>Plan output (click to expand)</summary>",
              "",
              "```",
              plan,
              "```",
              "</details>",
            ].join("\n")

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(
              c => c.user.type === "Bot" && c.body.includes("Terraform PR Summary")
            )
            const method = existing ? "updateComment" : "createComment"
            const params = existing
              ? { owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body }
              : { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body }
            await github.rest.issues[method](params)

      - name: Fail on hard gate violations
        run: |
          FAIL=0
          [ "${{ steps.fmt.outcome }}"      = "failure" ] && \
            echo "::error::terraform fmt failed — run: cd infra/terraform && terraform fmt -recursive" && FAIL=1
          [ "${{ steps.tflint.outcome }}"   = "failure" ] && \
            echo "::error::tflint found rule violations — fix before merging" && FAIL=1
          [ "${{ steps.validate.outcome }}" = "failure" ] && \
            echo "::error::terraform validate failed — fix HCL syntax errors" && FAIL=1
          exit $FAIL

  # ── 3. APP BUILD CHECK ────────────────────────────────────────────────────
  app-build-check:
    name: App Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build React app
        run: cd frontend && npm run build
        env:
          VITE_API_URL: http://localhost:8000/api

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: cd backend && pip install -r requirements.txt -q

      - name: Django system check
        run: cd backend && python manage.py check --deploy
        env:
          SECRET_KEY: ci-check-not-real
          DEBUG: "False"
          ALLOWED_HOSTS: localhost
          DJANGO_SETTINGS_MODULE: portfolio_api.settings

  # ── 4. APP HEALTH CHECK ───────────────────────────────────────────────────
  app-health-check:
    name: App Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: cd backend && pip install -r requirements.txt -q

      - name: Django deploy checks
        run: cd backend && python manage.py check --deploy
        env:
          SECRET_KEY: ci-check-not-real
          DEBUG: "False"
          ALLOWED_HOSTS: localhost
          DJANGO_SETTINGS_MODULE: portfolio_api.settings

      - name: Apply migrations (sqlite)
        run: cd backend && python manage.py migrate --noinput
        env:
          SECRET_KEY: ci-check-not-real
          DEBUG: "False"
          ALLOWED_HOSTS: localhost
          DJANGO_SETTINGS_MODULE: portfolio_api.settings

  # ── 5. SECURITY SCAN (TRIVY) ──────────────────────────────────────────────
  trivy-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          trivyignores: .trivyignore

  # ── 6. INFRACOST — projected monthly cost + cost change ───────────────────
  # Requires INFRACOST_API_KEY GitHub Secret (free at https://infracost.io)
  # Parses Terraform HCL directly — no AWS credentials or TFC needed.
  infracost:
    name: Infracost Cost Estimate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Infracost CLI
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # Generate cost breakdown for the base (target) branch first so we can diff
      - name: Generate base branch cost estimate
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          git checkout origin/${{ github.event.pull_request.base.ref }} -- infra/terraform
          infracost breakdown \
            --path infra/terraform \
            --terraform-init-flags="-backend=false" \
            --format json \
            --out-file /tmp/infracost-base.json
          # Restore PR branch state
          git checkout HEAD -- infra/terraform

      # Generate cost breakdown for the PR branch
      - name: Generate PR branch cost estimate
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          infracost breakdown \
            --path infra/terraform \
            --terraform-init-flags="-backend=false" \
            --format json \
            --out-file /tmp/infracost-pr.json

      # Diff base vs PR and post as a single upserted PR comment
      - name: Post cost diff as PR comment
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          infracost diff \
            --path /tmp/infracost-pr.json \
            --compare-to /tmp/infracost-base.json \
            --format json \
            --out-file /tmp/infracost-diff.json

          infracost comment github \
            --path /tmp/infracost-diff.json \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --repo ${{ github.repository }} \
            --pull-request ${{ github.event.pull_request.number }} \
            --behavior update

      # On push to main (or manual run), just produce a cost estimate so GitHub
      # registers the check context for branch protection selection.
      - name: Cost estimate (no PR context)
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          infracost breakdown \
            --path infra/terraform \
            --terraform-init-flags="-backend=false" \
            --format table
